org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.parallel=true

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official

# ---------------------------------------------------------------------------
# Everything below is deployment-specific. These are the only values that need
# changing to point the app at a different server or package name.
# ---------------------------------------------------------------------------

# The origin the app wraps. Must be https and must serve
# /.well-known/assetlinks.json matching APP_PACKAGE_NAME and the signing cert,
# or Chrome shows a URL bar instead of running full-screen.
GIANS_HOST_URL=https://gians.onrender.com

# Must match ANDROID_PACKAGE_NAME in the server's .env.
GIANS_APPLICATION_ID=com.gians.app
