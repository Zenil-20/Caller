# ---------------------------------------------------------------------------
# coturn — TURN relay for gians
#
# Replace EXTERNAL_IP, REALM and STATIC_SECRET before use, then set the same
# secret as TURN_STATIC_SECRET in the app's .env so the two agree.
# ---------------------------------------------------------------------------

listening-port=3478
tls-listening-port=5349

# The server's PUBLIC address. On a cloud VM that sits behind NAT, use the
# "public/private" form so coturn advertises the right candidate:
#   external-ip=203.0.113.10/10.0.0.5
external-ip=EXTERNAL_IP

realm=REALM
server-name=REALM

# Time-limited credentials (coturn REST mode). The app derives usernames and
# passwords from this secret, so a leaked credential expires on its own.
use-auth-secret
static-auth-secret=STATIC_SECRET

# TLS lets TURN traverse networks that only allow 443-style encrypted traffic.
# Point these at your certificate once you have one.
# cert=/etc/letsencrypt/live/REALM/fullchain.pem
# pkey=/etc/letsencrypt/live/REALM/privkey.pem

# Relay port range. These must be open in the firewall and the cloud security
# group, or media will fail even though allocation succeeds.
min-port=49152
max-port=65535

fingerprint
stale-nonce=600

# Refuse to relay into private networks. Without this, an open TURN server can
# be abused to reach services inside your own infrastructure.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Audio-only calls are small; this caps abuse without affecting real use.
user-quota=12
total-quota=1200
max-bps=128000

no-cli
no-tlsv1
no-tlsv1_1
syslog
